<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0A1A29">
<title>AXC · Marcar Asistencia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0A1A29; --navy2:#13283c;
    --orange:#EE992F; --cyan:#0EA5E9;
    --green:#16a34a; --red:#dc2626;
    --ink:#0f1b27; --muted:#6b7c8c; --line:#e5ecf2; --bg:#f4f7fa;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);font-family:'Poppins',system-ui,sans-serif;color:var(--ink)}
  .wrap{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

  /* Header */
  header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;padding:20px 22px 22px;border-radius:0 0 22px 22px}
  .brand{display:flex;align-items:center;gap:10px}
  .logo{width:38px;height:38px;border-radius:10px;background:var(--orange);display:grid;place-items:center;font-weight:700;font-size:15px;color:var(--navy)}
  .brand h1{font-size:17px;margin:0;font-weight:600;letter-spacing:.2px}
  .brand p{margin:1px 0 0;font-size:11px;color:#9fb3c4;font-weight:400}
  .clock{margin-top:16px;font-size:30px;font-weight:700;letter-spacing:1px}
  .date{font-size:12px;color:#9fb3c4;margin-top:-2px}

  /* Body */
  main{flex:1;padding:20px 18px 28px}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 4px 18px rgba(10,26,41,.04)}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.4px}
  label:first-child{margin-top:0}
  select,input{width:100%;padding:14px;font-size:16px;font-family:inherit;border:1.5px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);outline:none;transition:border .15s}
  select:focus,input:focus{border-color:var(--cyan)}
  .pin{letter-spacing:8px;text-align:center;font-weight:600}

  .btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
  .btn{border:none;border-radius:14px;padding:18px 10px;font-family:inherit;font-size:16px;font-weight:600;color:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:transform .08s,filter .15s}
  .btn:active{transform:scale(.97)}
  .btn:disabled{opacity:.5}
  .btn .ico{font-size:22px}
  .btn-in{background:var(--green)}
  .btn-out{background:var(--orange)}

  .hint{font-size:11.5px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.5}
  .load-btn{width:100%;margin-top:16px;padding:14px;border:none;border-radius:12px;background:var(--cyan);color:#fff;font-family:inherit;font-weight:600;font-size:15px;cursor:pointer}
  .load-btn:active{transform:scale(.98)}
  .saludo{text-align:center;font-size:13.5px;font-weight:600;color:var(--green);margin-top:12px;min-height:18px}
  .saludo.err{color:var(--red)}

  /* Camera overlay */
  .overlay{position:fixed;inset:0;background:#000;z-index:50;display:none;flex-direction:column}
  .overlay.on{display:flex}
  .cam-head{color:#fff;text-align:center;padding:14px;font-size:14px;font-weight:600;background:rgba(0,0,0,.5)}
  .cam-head small{display:block;font-weight:400;color:#9fb3c4;font-size:11px;margin-top:2px}
  #video,#snap{flex:1;width:100%;object-fit:cover;background:#000}
  #snap{display:none}
  .cam-foot{padding:18px;display:flex;gap:12px;justify-content:center;align-items:center;background:rgba(0,0,0,.5)}
  .shutter{width:68px;height:68px;border-radius:50%;border:4px solid #fff;background:var(--orange);cursor:pointer}
  .cam-btn{flex:1;max-width:150px;padding:14px;border:none;border-radius:12px;font-family:inherit;font-weight:600;font-size:15px;cursor:pointer}
  .cam-cancel{background:#374151;color:#fff}
  .cam-confirm{background:var(--green);color:#fff}
  .cam-retry{background:#374151;color:#fff}

  /* Result */
  .result{position:fixed;inset:0;background:rgba(10,26,41,.55);z-index:60;display:none;align-items:center;justify-content:center;padding:24px}
  .result.on{display:flex}
  .rcard{background:#fff;border-radius:20px;padding:28px 24px;text-align:center;max-width:360px;width:100%;animation:pop .25s ease}
  @keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
  .rico{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;margin:0 auto 14px;font-size:32px}
  .ok .rico{background:#dcfce7;color:var(--green)}
  .warn .rico{background:#fef3c7;color:#b45309}
  .err .rico{background:#fee2e2;color:var(--red)}
  .rcard h3{margin:0 0 4px;font-size:19px}
  .rcard .sub{color:var(--muted);font-size:13px;margin-bottom:16px}
  .rrow{display:flex;justify-content:space-between;font-size:13.5px;padding:7px 0;border-top:1px solid var(--line)}
  .rrow span:first-child{color:var(--muted)}
  .rrow span:last-child{font-weight:600}
  .close-btn{margin-top:18px;width:100%;padding:14px;border:none;border-radius:12px;background:var(--navy);color:#fff;font-family:inherit;font-weight:600;font-size:15px;cursor:pointer}

  /* Loader */
  .loader{position:fixed;inset:0;background:rgba(10,26,41,.55);z-index:70;display:none;align-items:center;justify-content:center;flex-direction:column;color:#fff}
  .loader.on{display:flex}
  .spin{width:44px;height:44px;border:4px solid rgba(255,255,255,.25);border-top-color:var(--orange);border-radius:50%;animation:rot .8s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}
  .loader p{margin-top:14px;font-size:14px}

  footer{text-align:center;padding:14px;font-size:10.5px;color:var(--muted)}
  .badge{color:var(--cyan);font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo">AXC</div>
      <div>
        <h1>Control de Asistencia</h1>
        <p>AXC Constructora</p>
      </div>
    </div>
    <div class="clock" id="clock">--:--:--</div>
    <div class="date" id="date">—</div>
  </header>

  <main>
    <div class="card">
      <label for="codigo">Código de empleado</label>
      <input id="codigo" type="text" inputmode="text" placeholder="EMP-001" autocomplete="off">

      <label for="pin">PIN (4 dígitos)</label>
      <input id="pin" class="pin" type="password" inputmode="numeric" maxlength="4" placeholder="••••" autocomplete="off">

      <button class="load-btn" id="loadObras">Cargar mis obras</button>
      <div class="saludo" id="saludo"></div>

      <label for="obra">Obra</label>
      <select id="obra" disabled><option value="">Primero cargá tus obras…</option></select>

      <div class="btns">
        <button class="btn btn-in"  id="btnIn" disabled><span class="ico">↧</span>Entrada</button>
        <button class="btn btn-out" id="btnOut" disabled><span class="ico">↥</span>Salida</button>
      </div>
      <p class="hint">Al marcar se tomará una selfie en vivo y tu ubicación GPS.<br>La hora la registra el servidor.</p>
    </div>
  </main>

  <footer>
    Desarrollado por <span class="badge">Conexdata</span> · www.conexdata.com.py
  </footer>
</div>

<!-- Cámara -->
<div class="overlay" id="overlay">
  <div class="cam-head">Mirá a la cámara<small id="camTipo">Marcando entrada</small></div>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="snap"></canvas>
  <div class="cam-foot" id="camFootCapture">
    <button class="cam-btn cam-cancel" id="camCancel">Cancelar</button>
    <button class="shutter" id="shutter" aria-label="Capturar"></button>
    <div style="flex:1;max-width:150px"></div>
  </div>
  <div class="cam-foot" id="camFootConfirm" style="display:none">
    <button class="cam-btn cam-retry" id="camRetry">Repetir</button>
    <button class="cam-btn cam-confirm" id="camConfirm">Confirmar y marcar</button>
  </div>
</div>

<!-- Loader -->
<div class="loader" id="loader"><div class="spin"></div><p id="loaderMsg">Procesando…</p></div>

<!-- Resultado -->
<div class="result" id="result">
  <div class="rcard" id="rcard">
    <div class="rico" id="rico">✓</div>
    <h3 id="rTitle">Marcación registrada</h3>
    <div class="sub" id="rSub"></div>
    <div id="rDetail"></div>
    <button class="close-btn" id="rClose">Listo</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* =====================================================================
   CONFIG  —  pegá la misma URL y anon key que usás en tus otros archivos AXC
   ===================================================================== */
const SUPABASE_URL  = "https://zvucnezwhgfgupasgqnd.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp2dWNuZXp3aGdmZ3VwYXNncW5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTkxMzksImV4cCI6MjA5MjE5NTEzOX0.N_examWWtb6EZcSFzzO93cExqfOvD4PrjPSXNzLLzNg";   // <-- clave pública (anon) de AXC
const BUCKET        = "asistencia-fotos";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

/* ---------- Reloj ---------- */
const dias  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
function tick(){
  const n = new Date();
  const p = x => String(x).padStart(2,'0');
  document.getElementById('clock').textContent = `${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
  document.getElementById('date').textContent  = `${dias[n.getDay()]} ${n.getDate()} de ${meses[n.getMonth()]} ${n.getFullYear()}`;
}
setInterval(tick,1000); tick();

/* ---------- Cargar MIS obras (según asignación, validando PIN en el servidor) ---------- */
async function cargarMisObras(){
  const codigo = document.getElementById('codigo').value.trim();
  const pin    = document.getElementById('pin').value.trim();
  const sel    = document.getElementById('obra');
  const saludo = document.getElementById('saludo');
  const btn    = document.getElementById('loadObras');
  saludo.className = 'saludo';
  if(!codigo){ saludo.className='saludo err'; saludo.textContent='Ingresá tu código'; return; }
  if(pin.length !== 4){ saludo.className='saludo err'; saludo.textContent='El PIN debe tener 4 dígitos'; return; }

  btn.disabled = true; btn.textContent = 'Buscando…';
  try{
    const { data, error } = await sb.rpc('asis_mis_obras', { p_codigo: codigo, p_pin: pin });
    if(error) throw error;
    if(!data || !data.ok){
      saludo.className='saludo err'; saludo.textContent = (data && data.msg) || 'No se pudo validar';
      sel.disabled = true; sel.innerHTML = '<option value="">Primero cargá tus obras…</option>';
      habilitarMarca(false);
      return;
    }
    const obras = data.obras || [];
    if(!obras.length){
      saludo.className='saludo err';
      saludo.textContent = `Hola ${data.empleado}, no tenés obras asignadas. Pedí al admin que te asigne.`;
      sel.disabled = true; sel.innerHTML = '<option value="">Sin obras asignadas</option>';
      habilitarMarca(false);
      return;
    }
    saludo.className='saludo'; saludo.textContent = `Hola ${data.empleado} 👋 elegí tu obra y marcá`;
    sel.disabled = false;
    sel.innerHTML = '<option value="">Seleccioná tu obra…</option>' +
      obras.map(o => `<option value="${o.id}">${o.nombre}</option>`).join('');
    habilitarMarca(true);
  }catch(e){
    saludo.className='saludo err'; saludo.textContent = 'Error: ' + (e.message||'no se pudo cargar');
    console.error(e);
  }finally{
    btn.disabled = false; btn.textContent = 'Cargar mis obras';
  }
}
function habilitarMarca(on){
  document.getElementById('btnIn').disabled  = !on;
  document.getElementById('btnOut').disabled = !on;
}

/* ---------- Estado de la marcación en curso ---------- */
let pendiente = null;   // 'entrada' | 'salida'
let stream = null;
let fotoBlob = null;

/* ---------- Validación previa ---------- */
function validar(){
  const obra   = document.getElementById('obra').value;
  const codigo = document.getElementById('codigo').value.trim();
  const pin    = document.getElementById('pin').value.trim();
  if(!obra)   return 'Seleccioná tu obra';
  if(!codigo) return 'Ingresá tu código de empleado';
  if(pin.length !== 4) return 'El PIN debe tener 4 dígitos';
  return null;
}

/* ---------- Abrir cámara ---------- */
async function abrirCamara(tipo){
  const err = validar();
  if(err){ mostrarResultado('err','Faltan datos', err); return; }
  pendiente = tipo;
  fotoBlob = null;
  document.getElementById('camTipo').textContent = tipo === 'entrada' ? 'Marcando entrada' : 'Marcando salida';
  document.getElementById('camFootCapture').style.display = 'flex';
  document.getElementById('camFootConfirm').style.display = 'none';
  document.getElementById('video').style.display = 'block';
  document.getElementById('snap').style.display = 'none';
  document.getElementById('overlay').classList.add('on');
  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'user', width:{ideal:720}, height:{ideal:960} }, audio:false
    });
    document.getElementById('video').srcObject = stream;
  }catch(e){
    cerrarCamara();
    mostrarResultado('err','Sin cámara','No se pudo acceder a la cámara. Permitila en el navegador.');
  }
}
function cerrarCamara(){
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  document.getElementById('overlay').classList.remove('on');
}

/* ---------- Capturar foto ---------- */
function capturar(){
  const v = document.getElementById('video');
  const c = document.getElementById('snap');
  c.width = v.videoWidth; c.height = v.videoHeight;
  const ctx = c.getContext('2d');
  // Espejar para que la selfie se vea natural
  ctx.translate(c.width,0); ctx.scale(-1,1);
  ctx.drawImage(v,0,0,c.width,c.height);
  c.toBlob(b => { fotoBlob = b; }, 'image/jpeg', 0.7);
  v.style.display='none'; c.style.display='block';
  document.getElementById('camFootCapture').style.display='none';
  document.getElementById('camFootConfirm').style.display='flex';
}
function repetir(){
  document.getElementById('video').style.display='block';
  document.getElementById('snap').style.display='none';
  document.getElementById('camFootCapture').style.display='flex';
  document.getElementById('camFootConfirm').style.display='none';
  fotoBlob = null;
}

/* ---------- GPS ---------- */
function obtenerGPS(){
  return new Promise(resolve=>{
    if(!navigator.geolocation){ resolve({lat:null,lng:null}); return; }
    navigator.geolocation.getCurrentPosition(
      p => resolve({lat:p.coords.latitude, lng:p.coords.longitude}),
      () => resolve({lat:null,lng:null}),
      { enableHighAccuracy:true, timeout:10000, maximumAge:0 }
    );
  });
}

/* ---------- Confirmar y enviar ---------- */
async function confirmar(){
  if(!fotoBlob){ return; }
  const tipo   = pendiente;
  const obra   = document.getElementById('obra').value;
  const codigo = document.getElementById('codigo').value.trim();
  const pin    = document.getElementById('pin').value.trim();
  cerrarCamara();
  loader(true,'Obteniendo ubicación…');

  try{
    const pos = await obtenerGPS();

    loader(true,'Subiendo foto…');
    const path = `${codigo}/${Date.now()}.jpg`;
    const up = await sb.storage.from(BUCKET).upload(path, fotoBlob, { contentType:'image/jpeg' });
    let fotoUrl = null;
    if(!up.error){
      fotoUrl = sb.storage.from(BUCKET).getPublicUrl(path).data.publicUrl;
    }

    loader(true,'Registrando marcación…');
    const { data, error } = await sb.rpc('asis_marcar', {
      p_codigo: codigo, p_pin: pin, p_ubicacion: obra, p_tipo: tipo,
      p_lat: pos.lat, p_lng: pos.lng, p_foto_url: fotoUrl,
      p_dispositivo: navigator.userAgent.slice(0,180)
    });
    loader(false);

    if(error){ mostrarResultado('err','Error', error.message || 'No se pudo registrar.'); return; }
    if(!data || !data.ok){ mostrarResultado('err','No registrado', (data && data.msg) || 'Datos inválidos.'); return; }

    // Éxito
    const dentro = data.dentro;
    const estado = dentro === false ? 'warn' : 'ok';
    const titulo = tipo === 'entrada' ? 'Entrada registrada' : 'Salida registrada';
    let detalle = `<div class="rrow"><span>Empleado</span><span>${data.empleado}</span></div>`;
    detalle += `<div class="rrow"><span>Obra</span><span>${data.obra}</span></div>`;
    detalle += `<div class="rrow"><span>Hora</span><span>${data.hora}</span></div>`;
    if(data.distancia !== null && data.distancia !== undefined){
      detalle += `<div class="rrow"><span>Distancia a la obra</span><span>${data.distancia} m</span></div>`;
      detalle += `<div class="rrow"><span>Geocerca</span><span>${dentro ? '✅ Dentro' : '⚠️ Fuera de rango'}</span></div>`;
    }
    mostrarResultado(estado, titulo, dentro===false ? 'Marcaste fuera del radio de la obra.' : '¡Listo!', detalle);

    // Limpiar PIN y obras por seguridad (re-cargar para la próxima marca)
    document.getElementById('pin').value = '';
    resetObras();
  }catch(e){
    loader(false);
    mostrarResultado('err','Error', 'Ocurrió un problema. Intentá de nuevo.');
    console.error(e);
  }
}

/* ---------- UI helpers ---------- */
function loader(on,msg){
  document.getElementById('loaderMsg').textContent = msg || 'Procesando…';
  document.getElementById('loader').classList.toggle('on', on);
}
function mostrarResultado(tipo,titulo,sub,detalle){
  const card = document.getElementById('rcard');
  card.className = 'rcard ' + tipo;
  document.getElementById('rico').textContent = tipo==='ok' ? '✓' : (tipo==='warn' ? '!' : '✕');
  document.getElementById('rTitle').textContent = titulo;
  document.getElementById('rSub').textContent = sub || '';
  document.getElementById('rDetail').innerHTML = detalle || '';
  document.getElementById('result').classList.add('on');
}

/* ---------- Eventos ---------- */
document.getElementById('btnIn').onclick      = () => abrirCamara('entrada');
document.getElementById('btnOut').onclick     = () => abrirCamara('salida');
document.getElementById('shutter').onclick    = capturar;
document.getElementById('camRetry').onclick   = repetir;
document.getElementById('camConfirm').onclick = confirmar;
document.getElementById('camCancel').onclick  = cerrarCamara;
document.getElementById('rClose').onclick     = () => document.getElementById('result').classList.remove('on');
document.getElementById('loadObras').onclick  = cargarMisObras;
function resetObras(){
  const sel = document.getElementById('obra');
  sel.disabled = true; sel.innerHTML = '<option value="">Primero cargá tus obras…</option>';
  document.getElementById('saludo').textContent = '';
  habilitarMarca(false);
}
document.getElementById('codigo').addEventListener('input', resetObras);
document.getElementById('pin').oninput = e => { e.target.value = e.target.value.replace(/\D/g,''); resetObras(); };
</script>
</body>
</html>
